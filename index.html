<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Launcher Finder</title>

  <style>
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      background:#0b0d12;
      color:#e6e6e6;
      height:100vh;
      overflow:hidden;
      display:flex;
    }

    /* ===== BACKGROUND HALO (Modrinth-like ring) ===== */
    .bg-ring{
      position:fixed;
      inset:0;
      z-index:-1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .ring{
      width:850px;
      height:850px;
      border-radius:50%;
      position:relative;

      /* neon ring look */
      background:
        conic-gradient(
          from 0deg,
          rgba(120,200,255,0.0) 0deg,
          rgba(120,200,255,0.35) 60deg,
          rgba(180,120,255,0.30) 120deg,
          rgba(120,255,200,0.25) 200deg,
          rgba(255,120,180,0.25) 280deg,
          rgba(120,200,255,0.0) 360deg
        );

      /* create hole in center */
      -webkit-mask: radial-gradient(circle,
        transparent 0 38%,
        black 40% 55%,
        transparent 58% 100%);

      mask: radial-gradient(circle,
        transparent 0 38%,
        black 40% 55%,
        transparent 58% 100%);

      filter: blur(25px);
      opacity:0.55;
      animation: pulse 12s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{ transform:scale(1) rotate(0deg); }
      50%{ transform:scale(1.06) rotate(12deg); }
    }

    /* ===== LEFT SIDEBAR ===== */
    .sidebar{
      width:70px;
      background:#11141bcc;
      backdrop-filter: blur(8px);
      border-right:1px solid #222;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:10px 0;
      gap:10px;
    }

    .icon{
      width:42px;
      height:42px;
      border-radius:10px;
      background:#1a1f2a;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:0.2s;
      border:1px solid transparent;
      font-size:12px;
    }

    .icon:hover{ background:#232a3a; }
    .icon.active{ background:#20283a; border-color:#3a4a66; }

    /* ===== MAIN ===== */
    .main{
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .topbar{
      height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      border-bottom:1px solid #222;
      background:#0f1218cc;
      backdrop-filter: blur(8px);
    }

    .search{ width:300px; }

    input{
      width:100%;
      padding:8px 10px;
      border:none;
      border-radius:8px;
      background:#1a1f2a;
      color:#fff;
      outline:none;
    }

    /* ===== GRID ===== */
    .grid{
      flex:1;
      padding:20px;
      overflow:auto;
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap:12px;
    }

    .card{
      background:#141925cc;
      border:1px solid #1f2633;
      border-radius:14px;
      padding:12px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-3px);
      border-color:#2e3a52;
    }

    .card img{
      width:40px;
      height:40px;
      object-fit:contain;
      margin-bottom:8px;
    }

    .name{ font-weight:600; margin-bottom:4px; }
    .tags{ font-size:11px; opacity:0.6; }

    /* ===== MODAL ===== */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.65);
      display:none;
      align-items:center;
      justify-content:center;
    }

    .modal-content{
      width:600px;
      max-width:90%;
      background:#141925;
      border:1px solid #2a3446;
      border-radius:12px;
      padding:20px;
    }

    .modal img{
      width:100%;
      border-radius:10px;
      margin-top:10px;
    }

    .tag{
      display:inline-block;
      background:#1f2633;
      padding:4px 8px;
      margin:3px;
      border-radius:6px;
      font-size:12px;
    }
  </style>
</head>
<body>

<!-- MODRINTH-LIKE HALO -->
<div class="bg-ring">
  <div class="ring"></div>
</div>

<div class="sidebar" id="filters"></div>

<div class="main">
  <div class="topbar">
    <div>Launchers</div>
    <div class="search"><input id="search" placeholder="Поиск..."></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
let data=[];
let activeTags=new Set();

fetch('launchers.json')
.then(r=>r.json())
.then(j=>{
  data=j;
  renderFilters();
  render();
});

function renderFilters(){
  const set=new Set();
  data.forEach(l=>l.tags.forEach(t=>set.add(t)));

  const c=document.getElementById('filters');

  set.forEach(tag=>{
    const el=document.createElement('div');
    el.className='icon';
    el.textContent=tag[0].toUpperCase();

    el.onclick=()=>{
      if(activeTags.has(tag)){
        activeTags.delete(tag);
        el.classList.remove('active');
      }else{
        activeTags.add(tag);
        el.classList.add('active');
      }
      render();
    };

    c.appendChild(el);
  });
}

function render(){
  const s=document.getElementById('search').value.toLowerCase();

  const filtered=data.filter(l=>{
    const ok=l.name.toLowerCase().includes(s);
    const tags=activeTags.size===0||[...activeTags].every(t=>l.tags.includes(t));
    return ok&&tags;
  });

  const g=document.getElementById('grid');
  g.innerHTML='';

  filtered.forEach(l=>{
    const el=document.createElement('div');
    el.className='card';
    el.innerHTML=`
      <img src="${l.logo}">
      <div class="name">${l.name}</div>
      <div class="tags">${l.tags.join(', ')}</div>
    `;
    el.onclick=()=>open(l);
    g.appendChild(el);
  });
}

function open(l){
  const m=document.getElementById('modal');
  const c=document.getElementById('modalContent');

  c.innerHTML=`
    <h2>${l.name}</h2>
    <p>${l.description}</p>
    <div>${l.tags.map(t=>`<span class='tag'>${t}</span>`).join('')}</div>
    ${l.images.map(i=>`<img src="${i}">`).join('')}
  `;

  m.style.display='flex';
}

document.getElementById('modal').onclick=(e)=>{
  if(e.target.id==='modal') e.target.style.display='none';
};

document.getElementById('search').oninput=render;
</script>

</body>
</html>
