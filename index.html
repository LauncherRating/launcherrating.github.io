<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Launcher Finder</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; display:flex; height:100vh; }
    .sidebar { width:220px; background:#f4f4f4; padding:10px; overflow-y:auto; }
    .content { flex:1; display:flex; flex-direction:column; }
    .search { padding:10px; border-bottom:1px solid #ddd; }
    .grid { flex:1; display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:10px; padding:10px; overflow-y:auto; }
    .card { border:1px solid #ccc; border-radius:10px; padding:10px; cursor:pointer; text-align:center; background:white; }
    .card img { max-width:80px; height:80px; object-fit:contain; }
    .details { width:300px; border-left:1px solid #ddd; padding:10px; overflow-y:auto; }
    .tag { display:inline-block; background:#ddd; padding:3px 6px; margin:2px; border-radius:5px; font-size:12px; }
  </style>
</head>
<body>

<div class="sidebar" id="filters"></div>

<div class="content">
  <div class="search">
    <input type="text" id="search" placeholder="Поиск..." style="width:100%; padding:5px;">
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="details" id="details">
  <h3>Выберите лаунчер</h3>
</div>

<script>
let data = [];
let activeTags = new Set();

fetch('launchers.json')
  .then(res => res.json())
  .then(json => {
    data = json.sort((a,b)=>a.order-b.order);
    renderFilters();
    render();
  });

function renderFilters() {
  const allTags = new Set();
  data.forEach(l => l.tags.forEach(t => allTags.add(t)));

  const container = document.getElementById('filters');
  container.innerHTML = '<h3>Фильтры</h3>';

  allTags.forEach(tag => {
    const el = document.createElement('div');
    el.innerHTML = `<label><input type="checkbox" value="${tag}"> ${tag}</label>`;
    el.querySelector('input').onchange = (e)=>{
      if(e.target.checked) activeTags.add(tag);
      else activeTags.delete(tag);
      render();
    };
    container.appendChild(el);
  });
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();

  const filtered = data.filter(l => {
    const matchSearch = l.name.toLowerCase().includes(search);

    return matchSearch && matchTags;
  });
