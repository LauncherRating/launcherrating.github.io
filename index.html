<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Launcher Finder</title>

  <style>
    body {
      margin:0;
      font-family: Inter, Arial, sans-serif;
      background:#0f1115;
      color:#e6e6e6;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    /* Halo background */
    .halo {
      position:fixed;
      width:700px;
      height:700px;
      border-radius:50%;
      filter: blur(80px);
      opacity:0.65;
      z-index:-1;
      animation: pulse 10s infinite ease-in-out, move 40s infinite linear;
    }

    .halo1 {
      background: radial-gradient(circle, rgba(255,140,80,0.35), transparent 70%);
      top:10%;
      left:20%;
    }

    .halo2 {
      background: radial-gradient(circle, rgba(255,200,120,0.3), transparent 70%);
      top:60%;
      left:60%;
      animation-delay: 2s;
    }

    .halo3 {
      background: radial-gradient(circle, rgba(255,120,100,0.25), transparent 70%);
      top:40%;
      left:10%;
      animation-delay: 4s;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity:0.5; }
      50% { transform: scale(1.2); opacity:0.8; }
    }

    @keyframes move {
      0% { transform: translate(0,0); }
      50% { transform: translate(20px, -20px); }
      100% { transform: translate(0,0); }
    }
      50% { transform: translate(50px, -50px); }
      100% { transform: translate(0,0); }
    }

    *::-webkit-scrollbar { width:8px; }
    *::-webkit-scrollbar-thumb { background:#2a2f3a; border-radius:10px; }

    .sidebar {
      width:240px;
      background:#15192288;
      backdrop-filter: blur(4px);
      padding:15px;
      overflow-y:auto;
      border-right:1px solid #222;
    }

    .filter-btn {
      display:block;
      padding:8px 10px;
      margin:5px 0;
      border:1px solid #2a2f3a;
      border-radius:8px;
      cursor:pointer;
      transition:0.2s;
    }

    .filter-btn:hover { background:#1c212b; }
    .filter-btn.active { background:#2a2f3a; }

    .content {
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .search {
      padding:15px;
      border-bottom:1px solid #222;
      flex-shrink:0;
      box-sizing:border-box;
    }

    input {
      width:100%;
      padding:8px;
      background:#1c212b;
      border:none;
      border-radius:8px;
      color:white;
      box-sizing:border-box;
    }

    .grid {
      flex:1;
      padding:15px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .card {
      display:flex;
      align-items:center;
      gap:15px;
      background:#15192288;
      border-radius:12px;
      padding:10px 15px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover { background:#1c212b; }

    .card img { width:50px; height:50px; object-fit:contain; }

    .details {
      width:320px;
      min-width:250px;
      max-width:600px;
      background:#15192288;
      backdrop-filter: blur(4px);
      border-left:1px solid #222;
      padding:15px;
      overflow-y:auto;
      position:relative;
    }

    .resizer {
      position:absolute;
      left:0;
      top:0;
      width:6px;
      height:100%;
      cursor:ew-resize;
    }

    .tag {
      display:inline-block;
      background:#1f2530;
      padding:4px 8px;
      margin:3px;
      border-radius:6px;
      font-size:12px;
    }

    .preview-overlay {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:999;
      cursor:zoom-out;
    }

    .preview-overlay img {
      max-width:90%;
      max-height:90%;
      border-radius:10px;
    }

    a { color:#7aa2ff; text-decoration:none; }
  </style>
</head>
<body>

<div class="halo halo1"></div>
<div class="halo halo2"></div>
<div class="halo halo3"></div>

<div class="sidebar" id="filters"></div>

<div class="content">
  <div class="search">
    <input type="text" id="search" placeholder="Поиск лаунчера...">
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="details" id="details">
  <div class="resizer" id="resizer"></div>
  <h3>Выберите лаунчер</h3>
</div>

<script>
let data = [];
let activeTags = new Set();

fetch('launchers.json')
  .then(res => res.json())
  .then(json => {
    data = json.sort((a,b)=>a.order-b.order);
    renderFilters();
    render();
  })
  .catch(e => {
    document.body.innerHTML = '<pre style="color:red">Ошибка JSON:\n'+e+'</pre>';
  });

function renderFilters() {
  const allTags = new Set();
  data.forEach(l => l.tags.forEach(t => allTags.add(t)));

  const container = document.getElementById('filters');
  container.innerHTML = '<h3>Фильтры</h3>';

  allTags.forEach(tag => {
    const btn = document.createElement('div');
    btn.className = 'filter-btn';
    btn.textContent = tag;

    btn.onclick = () => {
      if (activeTags.has(tag)) {
        activeTags.delete(tag);
        btn.classList.remove('active');
      } else {
        activeTags.add(tag);
        btn.classList.add('active');
      }
      render();
    };

    container.appendChild(btn);
  });
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();

  const filtered = data.filter(l => {
    const matchSearch = l.name.toLowerCase().includes(search);
    const matchTags = activeTags.size === 0 || [...activeTags].every(tag => l.tags.includes(tag));
    return matchSearch && matchTags;
  });

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  filtered.forEach(l => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${l.logo}">
      <div>
        <div style="font-weight:600">${l.name}</div>
        <div style="font-size:12px; opacity:0.6">${l.tags.join(', ')}</div>
      </div>
    `;
    card.onclick = ()=>showDetails(l);
    grid.appendChild(card);
  });
}

function showDetails(l) {
  const d = document.getElementById('details');
  d.innerHTML = `<div class="resizer" id="resizer"></div>
    <h2>${l.name}</h2>
    <p>${l.description}</p>
    <div>${l.tags.map(t=>`<span class='tag'>${t}</span>`).join('')}</div>
    <h4>Ссылки</h4>
    ${l.links.map(link=>`<div><a href="${link.url}" target="_blank">${link.name}</a></div>`).join('')}
    <h4>Фото</h4>
    ${l.images.map(img=>`<img src="${img}" class="previewable" style="width:100%; margin-bottom:8px; border-radius:8px; cursor:zoom-in;">`).join('')}
  `;

  initResizer();
  initPreview();
}

function initPreview() {
  document.querySelectorAll('.previewable').forEach(img => {
    img.onclick = () => {
      const overlay = document.createElement('div');
      overlay.className = 'preview-overlay';
      overlay.innerHTML = `<img src="${img.src}">`;
      overlay.onclick = () => overlay.remove();
      document.body.appendChild(overlay);
    };
  });
}

function initResizer() {
  const resizer = document.getElementById('resizer');
  const panel = document.getElementById('details');

  let startX, startWidth;

  resizer.onmousedown = (e) => {
    startX = e.clientX;
    startWidth = panel.offsetWidth;

    document.onmousemove = (e) => {
      const dx = startX - e.clientX;
      panel.style.width = (startWidth + dx) + 'px';
    };

    document.onmouseup = () => {
      document.onmousemove = null;
      document.onmouseup = null;
    };
  };
}

initResizer();

document.getElementById('search').oninput = render;
</script>

</body>
</html>
