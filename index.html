<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Launcher Finder</title>

  <style>
    body {
      margin:0;
      font-family: Inter, Arial, sans-serif;
      background:#0f1115;
      color:#e6e6e6;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    /* ===== HALO BACKGROUND ===== */
    .halo {
      position:fixed;
      width:700px;
      height:700px;
      border-radius:50%;
      z-index:-1;
      filter: blur(40px);
      opacity:0.55;
      mix-blend-mode: screen;
      animation: move 18s ease-in-out infinite;
    }

    .halo1 {
      top:10%; left:15%;
      background: radial-gradient(circle, rgba(255,120,90,0.9), transparent 60%);
    }

    .halo2 {
      top:50%; left:60%;
      background: radial-gradient(circle, rgba(120,160,255,0.8), transparent 60%);
      animation-delay: -6s;
    }

    .halo3 {
      top:70%; left:20%;
      background: radial-gradient(circle, rgba(180,90,255,0.7), transparent 60%);
      animation-delay: -12s;
    }

    @keyframes move {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(60px,-40px) scale(1.1); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* ===== SCROLLBAR ===== */
    *::-webkit-scrollbar { width:8px; }
    *::-webkit-scrollbar-thumb { background:#2a2f3a; border-radius:10px; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width:240px;
      background:#15192280;
      backdrop-filter: blur(4px);
      padding:15px;
      overflow-y:auto;
      border-right:1px solid #222;
    }

    .filter-btn {
      display:block;
      padding:8px 10px;
      margin:5px 0;
      border:1px solid #2a2f3a;
      border-radius:8px;
      cursor:pointer;
      transition:0.2s;
    }

    .filter-btn:hover { background:#1c212b; }
    .filter-btn.active { background:#2a2f3a; }

    /* ===== CENTER ===== */
    .content {
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .search {
      padding:15px;
      border-bottom:1px solid #222;
      flex-shrink:0;
      box-sizing:border-box;
    }

    input {
      width:100%;
      padding:8px;
      background:#1c212b;
      border:none;
      border-radius:8px;
      color:white;
      box-sizing:border-box;
    }

    .grid {
      flex:1;
      padding:15px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .card {
      display:flex;
      align-items:center;
      gap:15px;
      background:#15192270;
      border-radius:12px;
      padding:10px 15px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover { background:#1c212b; }

    .card img {
      width:50px;
      height:50px;
      object-fit:contain;
    }

    /* ===== DETAILS ===== */
    .details {
      width:320px;
      min-width:250px;
      max-width:600px;
      background:#15192270;
      backdrop-filter: blur(4px);
      border-left:1px solid #222;
      padding:15px;
      overflow-y:auto;
      position:relative;
    }

    .resizer {
      position:absolute;
      left:0;
      top:0;
      width:6px;
      height:100%;
      cursor:ew-resize;
    }

    .tag {
      display:inline-block;
      background:#1f2530;
      padding:4px 8px;
      margin:3px;
      border-radius:6px;
      font-size:12px;
    }

    /* ===== IMAGE PREVIEW ===== */
    .preview-overlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.92);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:999;
      cursor:pointer;
    }

    .preview-overlay img {
      max-width:92%;
      max-height:92%;
      border-radius:10px;
    }

    a { color:#7aa2ff; text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>

<!-- HALO BACKGROUND -->
<div class="halo halo1"></div>
<div class="halo halo2"></div>
<div class="halo halo3"></div>

<div class="sidebar" id="filters"></div>

<div class="content">
  <div class="search">
    <input type="text" id="search" placeholder="Поиск лаунчера...">
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="details" id="details">
  <div class="resizer" id="resizer"></div>
  <h3>Выберите лаунчер</h3>
</div>

<script>
let data = [];
let activeTags = new Set();

fetch('launchers.json')
  .then(r => r.json())
  .then(json => {
    data = json.sort((a,b)=>a.order-b.order);
    renderFilters();
    render();
  });

function renderFilters() {
  const allTags = new Set();
  data.forEach(l => l.tags.forEach(t => allTags.add(t)));

  const c = document.getElementById('filters');
  c.innerHTML = '<h3>Фильтры</h3>';

  allTags.forEach(tag => {
    const b = document.createElement('div');
    b.className = 'filter-btn';
    b.textContent = tag;

    b.onclick = () => {
      if (activeTags.has(tag)) {
        activeTags.delete(tag);
        b.classList.remove('active');
      } else {
        activeTags.add(tag);
        b.classList.add('active');
      }
      render();
    };

    c.appendChild(b);
  });
}

function render() {
  const s = document.getElementById('search').value.toLowerCase();

  const filtered = data.filter(l => {
    const okSearch = l.name.toLowerCase().includes(s);
    const okTags = activeTags.size === 0 || [...activeTags].every(t => l.tags.includes(t));
    return okSearch && okTags;
  });

  const g = document.getElementById('grid');
  g.innerHTML = '';

  filtered.forEach(l => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
      <img src="${l.logo}">
      <div>
        <div style="font-weight:600">${l.name}</div>
        <div style="font-size:12px;opacity:0.6">${l.tags.join(', ')}</div>
      </div>
    `;
    el.onclick = () => show(l);
    g.appendChild(el);
  });
}

function show(l) {
  const d = document.getElementById('details');
  d.innerHTML = `<div class="resizer" id="resizer"></div>
    <h2>${l.name}</h2>
    <p>${l.description}</p>
    <div>${l.tags.map(t=>`<span class='tag'>${t}</span>`).join('')}</div>
    <h4>Ссылки</h4>
    ${l.links.map(x=>`<div><a href="${x.url}" target="_blank">${x.name}</a></div>`).join('')}
    <h4>Фото</h4>
    ${l.images.map(img=>`<img src="${img}" class="preview" style="width:100%;margin-bottom:8px;border-radius:8px;cursor:pointer;">`).join('')}
  `;

  initResize();
  initPreview();
}

function initPreview() {
  document.querySelectorAll('.preview').forEach(img => {
    img.onclick = () => {
      const o = document.createElement('div');
      o.className = 'preview-overlay';
      o.innerHTML = `<img src="${img.src}">`;
      o.onclick = () => o.remove();
      document.body.appendChild(o);
    };
  });
}

function initResize() {
  const r = document.getElementById('resizer');
  const p = document.getElementById('details');

  let x,w;

  r.onmousedown = e => {
    x = e.clientX;
    w = p.offsetWidth;

    document.onmousemove = e => {
      p.style.width = (w + (x - e.clientX)) + 'px';
    };

    document.onmouseup = () => document.onmousemove = null;
  };
}

initResize();
document.getElementById('search').oninput = render;
</script>

</body>
</html>
