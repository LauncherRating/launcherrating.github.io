<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launcher Raiting</title>

  <!-- particles.js -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body {
      margin:0;
      font-family: Inter, Arial, sans-serif;
      background:#0f1115;
      color:#e6e6e6;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    #particles-js {
      position:fixed;
      width:100%;
      height:100%;
      z-index:-1;
    }

    .sidebar {
      width:240px;
      background:#151922;
      padding:15px;
      overflow-y:auto;
      border-right:1px solid #222;
    }

    .content {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .search {
      padding:15px;
      border-bottom:1px solid #222;
    }

    input {
      width:100%;
      padding:8px;
      background:#1c212b;
      border:none;
      border-radius:8px;
      color:white;
    }

    .grid {
      flex:1;
      padding:15px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .card {
      display:flex;
      align-items:center;
      gap:15px;
      background:#151922;
      border-radius:12px;
      padding:10px 15px;
      cursor:pointer;
      transition:0.2s;
      border:1px solid transparent;
    }

    .card:hover {
      background:#1c212b;
      border:1px solid #2a2f3a;
    }

    .card img {
      width:50px;
      height:50px;
      object-fit:contain;
    }

    .details {
      width:320px;
      background:#151922;
      border-left:1px solid #222;
      padding:15px;
      overflow-y:auto;
    }

    .tag {
      display:inline-block;
      background:#1f2530;
      padding:4px 8px;
      margin:3px;
      border-radius:6px;
      font-size:12px;
    }

    a { color:#7aa2ff; text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>

<div id="particles-js"></div>

<div class="sidebar" id="filters"></div>

<div class="content">
  <div class="search">
    <input type="text" id="search" placeholder="Поиск лаунчера...">
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="details" id="details">
  <h3>Выберите лаунчер</h3>
</div>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 50 },
    color: { value: "#555" },
    size: { value: 2 },
    move: { speed: 0.5 }
  }
});

let data = [];
let activeTags = new Set();

fetch('launchers.json')
  .then(res => res.json())
  .then(json => {
    data = json.sort((a,b)=>a.order-b.order);
    renderFilters();
    render();
  });

function renderFilters() {
  const allTags = new Set();
  data.forEach(l => l.tags.forEach(t => allTags.add(t)));

  const container = document.getElementById('filters');
  container.innerHTML = '<h3>Фильтры</h3>';

  allTags.forEach(tag => {
    const el = document.createElement('div');
    el.innerHTML = `<label><input type="checkbox" value="${tag}"> ${tag}</label>`;
    el.querySelector('input').onchange = (e)=>{
      if(e.target.checked) activeTags.add(tag);
      else activeTags.delete(tag);
      render();
    };
    container.appendChild(el);
  });
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();

  const filtered = data.filter(l => {
    const matchSearch = l.name.toLowerCase().includes(search);
    const matchTags = activeTags.size === 0 || l.tags.some(t => activeTags.has(t));
    return matchSearch && matchTags;
  });

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  filtered.forEach(l => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${l.logo}">
      <div>
        <div style="font-weight:600">${l.name}</div>
        <div style="font-size:12px; opacity:0.6">${l.tags.join(', ')}</div>
      </div>
    `;
    card.onclick = ()=>showDetails(l);
    grid.appendChild(card);
  });
}

function showDetails(l) {
  const d = document.getElementById('details');
  d.innerHTML = `
    <h2>${l.name}</h2>
    <p>${l.description}</p>
    <div>${l.tags.map(t=>`<span class='tag'>${t}</span>`).join('')}</div>
    <h4>Ссылки</h4>
    ${l.links.map(link=>`<div><a href="${link.url}" target="_blank">${link.name}</a></div>`).join('')}
    <h4>Фото</h4>
    ${l.images.map(img=>`<img src="${img}" style="width:100%; margin-bottom:8px; border-radius:8px;">`).join('')}
  `;
}

document.getElementById('search').oninput = render;
</script>

</body>
</html>
