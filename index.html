<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Launcher Finder</title>

  <style>
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      background:#0b0d12;
      color:#e6e6e6;
      height:100vh;
      overflow:hidden;
      display:flex;
    }

    /* ===== HALO ===== */
    .bg-ring{
      position:fixed;
      inset:0;
      z-index:-1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .ring{
      width:900px;
      height:900px;
      border-radius:50%;

      background:
        conic-gradient(
          from 0deg,
          rgba(120,200,255,0) 0deg,
          rgba(120,200,255,0.4) 60deg,
          rgba(180,120,255,0.35) 120deg,
          rgba(120,255,200,0.3) 200deg,
          rgba(255,120,180,0.3) 280deg,
          rgba(120,200,255,0) 360deg
        );

      -webkit-mask: radial-gradient(circle, transparent 0 36%, black 38% 58%, transparent 60%);
      mask: radial-gradient(circle, transparent 0 36%, black 38% 58%, transparent 60%);

      filter: blur(28px);
      opacity:0.6;

      animation: pulse 10s ease-in-out infinite;
    }

    @keyframes pulse{
      0%   { transform:scale(1) rotate(0deg) skew(0deg); }
      50%  { transform:scale(1.08) rotate(15deg) skew(4deg); }
      100% { transform:scale(1) rotate(0deg) skew(0deg); }
    }

    /* ===== GLOBAL SCROLLBAR ===== */
* {
  scrollbar-width: thin;
  scrollbar-color: #2a2f3a #0b0d12;
}

*::-webkit-scrollbar {
  width:10px;
  height:10px;
}

*::-webkit-scrollbar-track {
  background:#0b0d12;
}

*::-webkit-scrollbar-thumb {
  background:#2a2f3a;
  border-radius:10px;
  border:2px solid #0b0d12;
}

*::-webkit-scrollbar-thumb:hover {
  background:#3a4150;
}

/* ===== SIDEBAR ===== */
    .sidebar{
      width:140px;
      background:#11141bcc;
      backdrop-filter: blur(8px);
      border-right:1px solid #222;
      display:flex;
      flex-direction:column;
      padding:10px;
      gap:8px;
      overflow:auto;
    }

    .filter-btn{
      padding:6px 8px;
      border-radius:8px;
      background:#1a1f2a;
      border:1px solid transparent;
      cursor:pointer;
      font-size:12px;
      text-align:center;
    }

    .filter-btn.active{
      background:#20283a;
      border-color:#3a4a66;
    }

    /* ===== MAIN ===== */
    .main{
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .topbar{
      height:60px;
      display:flex;
      align-items:center;
      justify-content:center; /* центр */
      border-bottom:1px solid #222;
      background:#0f1218cc;
      backdrop-filter: blur(8px);
    }

    .search{ width:320px; }

    input{
      width:100%;
      padding:8px 10px;
      border:none;
      border-radius:8px;
      background:#1a1f2a;
      color:#fff;
    }

    /* ===== GRID ===== */
    .grid{
      flex:1;
      padding:20px;
      overflow:auto;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-content:flex-start;
    }

    .card{
      width:220px; /* фиксированный размер */
      background:#141925cc;
      border:1px solid #1f2633;
      border-radius:14px;
      padding:12px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-3px);
      border-color:#2e3a52;
    }

    .card img{
      width:40px;
      height:40px;
      object-fit:contain;
      margin-bottom:8px;
    }

    .name{ font-weight:600; margin-bottom:4px; }
    .tags{ font-size:11px; opacity:0.6; }

    /* ===== MODAL ===== */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.65);
      display:none;
      align-items:center;
      justify-content:center;
      overflow:auto; /* скролл */
      padding:20px;
    }

    .modal-content{
      width:600px;
      max-width:100%;
      background:#141925;
      border:1px solid #2a3446;
      border-radius:12px;
      padding:20px;
      max-height:90vh;
      overflow:auto;
    }

    .modal img{
      width:100%;
      border-radius:10px;
      margin-top:10px;
    }

    .tag{
      display:inline-block;
      background:#1f2633;
      padding:4px 8px;
      margin:3px;
      border-radius:6px;
      font-size:12px;
    }

    .links a{
      display:block;
      margin:4px 0;
      color:#7aa2ff;
    }

  </style>
</head>
<body>

<div class="bg-ring"><div class="ring"></div></div>

<div class="sidebar" id="filters"></div>

<div class="main">
  <div class="topbar">
    <div class="search"><input id="search" placeholder="Поиск..."></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
let data=[];
let activeTags=new Set();

fetch('launchers.json')
.then(r=>r.json())
.then(j=>{
  data=j;
  renderFilters();
  render();
});

function renderFilters(){
  const set=new Set();
  data.forEach(l=>l.tags.forEach(t=>set.add(t)));

  const c=document.getElementById('filters');
  c.innerHTML='';

  set.forEach(tag=>{
    const el=document.createElement('div');
    el.className='filter-btn';
    el.textContent=tag;

    el.onclick=()=>{
      if(activeTags.has(tag)){
        activeTags.delete(tag);
        el.classList.remove('active');
      }else{
        activeTags.add(tag);
        el.classList.add('active');
      }
      render();
    };

    c.appendChild(el);
  });
}

function render(){
  const s=document.getElementById('search').value.toLowerCase();

  const filtered=data.filter(l=>{
    const ok=l.name.toLowerCase().includes(s);
    const tags=activeTags.size===0||[...activeTags].every(t=>l.tags.includes(t));
    return ok&&tags;
  });

  const g=document.getElementById('grid');
  g.innerHTML='';

  filtered.forEach(l=>{
    const el=document.createElement('div');
    el.className='card';
    el.innerHTML=`
      <img src="${l.logo}">
      <div class="name">${l.name}</div>
      <div class="tags">${l.tags.join(', ')}</div>
    `;
    el.onclick=()=>openModal(l);
    g.appendChild(el);
  });
}

function openModal(l){
  const m=document.getElementById('modal');
  const c=document.getElementById('modalContent');

  c.innerHTML=`
    <h2>${l.name}</h2>
    <p>${l.description}</p>

    <div>${l.tags.map(t=>`<span class='tag'>${t}</span>`).join('')}</div>

    <h3>Ссылки</h3>
    <div class="links">
      ${l.links.map(link=>`<a href="${link.url}" target="_blank">${link.name}</a>`).join('')}
    </div>

    ${l.images.map(i=>`<img src="${i}">`).join('')}
  `;

  m.style.display='flex';
}

document.getElementById('modal').onclick=(e)=>{
  if(e.target.id==='modal') e.target.style.display='none';
};

document.getElementById('search').oninput=render;
</script>

</body>
</html>
